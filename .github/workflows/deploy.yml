name: Deploy to GitHub Pages + Cloudflare Pages

on:
  push:
    branches: [main]

jobs:
  deploy-cloudflare:
    name: Deploy to Cloudflare Pages
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Build for Cloudflare Pages (base = /)
        run: npm run build
        env:
          VITE_BASE_URL: /
          VITE_OPENAI_KEY: ${{ secrets.VITE_OPENAI_KEY }}
          VITE_PROXY_URL: ${{ secrets.VITE_PROXY_URL }}

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/pages-action@v1
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          projectName: wekall-intelligence
          directory: dist
          gitHubToken: ${{ secrets.GITHUB_TOKEN }}

  deploy-github:
    name: Deploy to GitHub Pages
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Build for GitHub Pages (base = /wekall-intelligence/)
        run: npm run build
        env:
          VITE_BASE_URL: /wekall-intelligence/
          VITE_OPENAI_KEY: ${{ secrets.VITE_OPENAI_KEY }}
          VITE_PROXY_URL: ${{ secrets.VITE_PROXY_URL }}

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
